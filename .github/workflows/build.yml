name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-dev g++ libboost-all-dev cmake libsnappy-dev libbz2-dev

      - name: Build RocksDB
        run: |
          mkdir -p build && cd build
          git clone --depth 1 https://github.com/facebook/rocksdb.git
          cd rocksdb
          make static_lib -j$(nproc)
          mv librocksdb.a ..

      - name: Build wallet-service
        run: |
          cd build
          cmake ..
          make
